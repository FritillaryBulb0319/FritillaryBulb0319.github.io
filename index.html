<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="简洁空白主页 — 带头像介绍栏、复选框昼夜切换、大卡片及超链接。">
    <title>川贝噼啪膏</title>
    <style>
        /* ---------- CSS 变量 (亮色主题 · 默认) ---------- */
        :root {
            --bg-body: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #5a5a5a;
            --text-muted: #9e9e9e;
            --border-light: #eeeeef;
            --border-soft: #f0f0f0;
            --card-bg: #ffffff;
            --card-shadow: 0 5px 18px rgba(0, 0, 0, 0.02), 0 1px 3px rgba(0, 0, 0, 0.02);
            --card-hover-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.05), 0 4px 8px rgba(0, 0, 0, 0.02);
            --card-border: #eeeeef;
            --avatar-bg: #f2f2f2;
            --avatar-text: #3a3a3a;
            --link-color: #3b82f6;
            --link-hover: #2563eb;
            --toggle-bg: #e2e8f0;
            --toggle-thumb: #ffffff;
            --toggle-checked-bg: #1e293b;
            --footer-border: #f0f0f0;
            --placeholder-color: #d4d4d4;
            --gentle-mark: #d4d4d4;
        }

        /* 暗色主题变量 */
        body.dark {
            --bg-body: #121212;
            --text-primary: #ededed;
            --text-secondary: #b0b0b0;
            --text-muted: #7e7e7e;
            --border-light: #2c2c2e;
            --border-soft: #2a2a2a;
            --card-bg: #1e1e1e;
            --card-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            --card-hover-shadow: 0 20px 30px -8px rgba(0, 0, 0, 0.4);
            --card-border: #2e2e30;
            --avatar-bg: #2c2c2e;
            --avatar-text: #cdcdcd;
            --link-color: #60a5fa;
            --link-hover: #93c5fd;
            --toggle-bg: #334155;
            --toggle-thumb: #facc15;
            --toggle-checked-bg: #0f172a;
            --footer-border: #2a2a2a;
            --placeholder-color: #4a4a4a;
            --gentle-mark: #4a4a4a;
        }

        /* 重置 & 基础样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-primary);
            font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Noto Sans', sans-serif;
            line-height: 1.5;
            font-weight: 400;
            font-size: 1rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        /* 主内容区域 */
        .main-content {
            flex: 1;
            padding: 2rem 2rem 3rem;
        }

        .container {
            max-width: 1280px;
            width: 100%;
            margin: 0 auto;
        }

        /* ----- 顶部区域：左侧头像+介绍 + 右侧复选框昼夜切换 ----- */
        .top-profile-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1.5rem;
            margin-bottom: 2.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-soft);
        }

        /* 头像+介绍区块 (左) */
        .profile-area {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .avatar {
            width: 80px;
            height: 80px;
            background-color: var(--avatar-bg);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            color: var(--avatar-text);
            transition: background 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            flex-shrink: 0;
        }

        .info h2 {
            font-size: 1.6rem;
            font-weight: 550;
            letter-spacing: -0.01em;
            margin-bottom: 0.3rem;
            color: var(--text-primary);
        }

        .info .bio {
            font-size: 1rem;
            color: var(--text-secondary);
            max-width: 320px;
        }

        /* ---------- 复选框昼夜切换样式 (现代滑动开关) ---------- */
        .theme-switch-wrapper {
            display: flex;
            align-items: center;
        }
        .theme-switch {
            position: relative;
            display: inline-block;
            width: 56px;
            height: 28px;
        }
        .theme-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--toggle-bg);
            transition: 0.2s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            left: 3px;
            bottom: 3px;
            background-color: var(--toggle-thumb);
            transition: 0.2s;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* 暗色模式下复选框选中时样式 */
        input:checked + .slider {
            background-color: var(--toggle-checked-bg);
        }
        input:checked + .slider:before {
            transform: translateX(28px);
        }
        /* 为了增加视觉提示，可以在滑块内显示图标（可选）使用伪元素content不能完全展示，故用背景字符麻烦，保持简洁 */
        /* 增加focus轮廓提升可访问性 */
        .theme-switch input:focus-visible + .slider {
            outline: 2px solid var(--link-color);
            outline-offset: 2px;
        }

        /* 英雄区 (简洁标题) */
        .hero-section {
            text-align: center;
            margin: 1.5rem 0 3rem 0;
        }

        .gentle-mark {
            font-size: 2.4rem;
            line-height: 1;
            color: var(--gentle-mark);
            margin-bottom: 0.75rem;
            font-weight: 300;
            transition: color 0.2s;
        }

        .main-title {
            font-size: clamp(2rem, 7vw, 3.6rem);
            font-weight: 550;
            letter-spacing: -0.02em;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .sub-text {
            font-size: 1.1rem;
            color: var(--text-secondary);
            max-width: 580px;
            margin-left: auto;
            margin-right: auto;
        }

        /* 大卡片网格 */
        .cards-section {
            margin: 2rem 0 1rem;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2.2rem;
        }

        /* 卡片样式 (支持暗色) */
        .card {
            background: var(--card-bg);
            border-radius: 2rem;
            padding: 2rem 1.8rem 2rem 1.8rem;
            transition: all 0.25s ease;
            border: 1px solid var(--card-border);
            box-shadow: var(--card-shadow);
        }

        .card:hover {
            border-color: var(--border-light);
            box-shadow: var(--card-hover-shadow);
            transform: translateY(-2px);
        }

        .card-icon {
            font-size: 2.6rem;
            margin-bottom: 1.2rem;
            line-height: 1;
            color: var(--text-primary);
            opacity: 0.85;
        }

        .card-title {
            font-size: 1.65rem;
            font-weight: 550;
            letter-spacing: -0.01em;
            margin-bottom: 0.75rem;
            color: var(--text-primary);
        }

        .card-description {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }

        .card-meta {
            font-size: 0.85rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border-soft);
            padding-top: 1rem;
            margin-top: 0.25rem;
            display: inline-block;
            width: 100%;
        }

        /* 第一个卡片专属超链接样式 */
        .card-link-wrapper {
            margin-top: 1rem;
            text-align: left;
        }
        .card-link {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--link-color);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: all 0.2s;
            padding: 0.25rem 0;
        }
        .card-link:hover {
            color: var(--link-hover);
            border-bottom-color: var(--link-color);
            gap: 0.6rem;
        }
        .card-link span {
            font-size: 1.1rem;
        }

        /* 页脚 */
        .site-footer {
            text-align: center;
            padding: 1.8rem 1.5rem;
            font-size: 0.8rem;
            color: var(--text-muted);
            border-top: 1px solid var(--footer-border);
            background-color: var(--bg-body);
            transition: background 0.2s;
        }

        .footer-inner {
            max-width: 1280px;
            margin: 0 auto;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        /* 响应式 */
        @media (max-width: 720px) {
            .main-content {
                padding: 1.5rem 1.2rem;
            }
            .top-profile-row {
                flex-direction: row;
                flex-wrap: wrap;
            }
            .profile-area {
                flex: 1;
            }
            .avatar {
                width: 64px;
                height: 64px;
                font-size: 2.2rem;
            }
            .info h2 {
                font-size: 1.3rem;
            }
            .cards-grid {
                gap: 1.5rem;
            }
            .card {
                padding: 1.6rem 1.4rem;
            }
            .card-title {
                font-size: 1.45rem;
            }
            .hero-section {
                margin: 0.5rem 0 2rem;
            }
        }

        @media (max-width: 480px) {
            .profile-area {
                gap: 1rem;
            }
            .avatar {
                width: 56px;
                height: 56px;
                font-size: 1.9rem;
            }
            .theme-switch {
                width: 48px;
                height: 24px;
            }
            .slider:before {
                height: 18px;
                width: 18px;
            }
            input:checked + .slider:before {
                transform: translateX(24px);
            }
        }
    </style>
</head>
<body>

<main class="main-content">
    <div class="container">
        <!-- 顶部：左边头像 + 右边介绍栏位，右侧复选框昼夜切换 -->
        <div class="top-profile-row">
            <div class="profile-area">
                <!-- 左边头像 -->
                <div class="avatar" aria-label="头像">
                    <img src="toux.jpg" alt="头像">
                </div>
                <!-- 右边介绍文字 -->
                <div class="info">
                    <h2>川贝噼啪膏</h2>
                    <div class="bio">创意开发者 · 万恶的初中生<br>冷知识：右上角可以改昼夜模式喵</div>
                </div>
            </div>
            <!-- 昼夜模式切换复选框 -->
            <div class="theme-switch-wrapper">
                <label class="theme-switch" aria-label="昼夜模式切换">
                    <input type="checkbox" id="darkModeCheckbox">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <!-- 简洁英雄区 -->
        <div class="hero-section">
            <div class="gentle-mark">✧</div>
            <h1 class="main-title">川贝噼啪膏 · 主页</h1>
            <p class="sub-text">
                我也·不知道<br>
                写什么
            </p>
        </div>

        <!-- 大卡片区域 (三个大卡片) -->
        <div class="cards-section">
            <div class="cards-grid">
                <!-- 卡片 1：带超链接功能 -->
                <div class="card">
                    <div class="card-icon">✨</div>
                    <h2 class="card-title">土星MC</h2>
                    <p class="card-description">
                        这是我开的MC服务器awa
                    </p>
                    <div class="card-link-wrapper">
                        <a href="server" class="card-link" target="_blank" rel="noopener noreferrer">
                            <span>➡️</span> 访问页面
                        </a>
                    </div>
                    <div class="card-meta">✦ 请输入文本</div>
                </div>

                <!-- 卡片 2 -->
                <div class="card">
                    <div class="card-icon">🎨</div>
                    <h2 class="card-title">请输入文本</h2>
                    <p class="card-description">
                        请输入文本请输入文本请输入文本请输入文本请输入文本请输入文本请输入文本请输入文本请输入文本请输入文本
                    </p>
                    <div class="card-meta">✦ 请输入文本</div>
                </div>

                <!-- 卡片 3 -->
                <div class="card">
                    <div class="card-icon">⚡</div>
                    <h2 class="card-title">请输入文本</h2>
                    <p class="card-description">
                        请输入文本请输入文本请输入文本请输入文本请输入文本请输入文本请输入文本请输入文本请输入文本请输入文本
                    </p>
                    <div class="card-meta">✦ 请输入文本</div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer class="site-footer">
    <div class="footer-inner">
        <span>请输入文本</span>
        <span style="margin: 0 0.5rem;">·</span>
        <span>请输入文本</span>
    </div>
</footer>

<script>
    (function() {
        // 获取复选框元素
        const themeCheckbox = document.getElementById('darkModeCheckbox');
        const body = document.body;
        
        // 从 localStorage 读取主题偏好
        const savedTheme = localStorage.getItem('theme');
        const isDark = savedTheme === 'dark';
        
        // 应用主题并同步复选框状态
        if (isDark) {
            body.classList.add('dark');
            if (themeCheckbox) themeCheckbox.checked = true;
        } else {
            body.classList.remove('dark');
            if (themeCheckbox) themeCheckbox.checked = false;
        }
        
        // 监听复选框变化事件
        function handleThemeChange(e) {
            if (themeCheckbox.checked) {
                body.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            } else {
                body.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            }
        }
        
        if (themeCheckbox) {
            themeCheckbox.addEventListener('change', handleThemeChange);
        }
        
        console.log('awa');
    })();
</script>
</body>
</html>
